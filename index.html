<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Effect Image Processor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Film Effect Image Processor</h1>

    <div id="upload-area" class="drop-zone">
        <p>Drag & Drop Image Here or <label class="file-label">Browse<input type="file" id="file-input" accept="image/*"></label></p>
        <p class="note">(Cloud import not implemented in this demo)</p>
    </div>

    <canvas id="preview-canvas" width="800" height="600"></canvas>

    <section id="filters">
        <h2>Film Filters</h2>
        <select id="film-filter">
            <option value="none">None</option>
            <option value="vintage">Vintage</option>
            <option value="cinema">Cinema</option>
            <option value="noir">Noir</option>
        </select>
    </section>

    <section id="adjustments">
        <h2>Adjustments</h2>
        <label>Brightness <input type="range" id="brightness" min="0" max="2" step="0.01" value="1"></label>
        <label>Contrast <input type="range" id="contrast" min="0" max="2" step="0.01" value="1"></label>
        <label>Saturation <input type="range" id="saturation" min="0" max="2" step="0.01" value="1"></label>
    </section>

    <section id="export">
        <h2>Export</h2>
        <label>Format
            <select id="export-format">
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPEG</option>
                <option value="image/webp">WebP</option>
            </select>
        </label>
        <label>Quality <input type="range" id="export-quality" min="0.1" max="1" step="0.1" value="0.92"></label>
        <label>Scale <input type="number" id="export-scale" min="0.1" max="1" step="0.1" value="1"></label>
        <button id="download-btn">Download</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
